<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Overlay</title>

  <!-- Socket.io client — chargé depuis le serveur local -->
  <script src="/socket.io/socket.io.js"></script>

  <style>
    /* ─── Reset & fond transparent (OBS Browser Source) ─────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ─── Conteneur principal du média ───────────────────────────────────── */
    #overlay-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    /* ─── Boîte média (image + vidéo + texte) ────────────────────────────── */
    #media-box {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0;
      transform: scale(0.92) translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      max-width: 1600px;
      max-height: 900px;
    }

    #media-box.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    #media-box.hiding {
      opacity: 0;
      transform: scale(0.92) translateY(-20px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    /* ─── Média (image ou vidéo) ─────────────────────────────────────────── */
    #media-element {
      display: block;
      max-width: 1600px;
      max-height: 820px;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.6);
    }

    /* ─── Texte optionnel ────────────────────────────────────────────────── */
    #media-caption {
      display: none;
      background: rgba(0, 0, 0, 0.72);
      color: #ffffff;
      font-size: 32px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 8px;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
      max-width: 1400px;
      line-height: 1.4;
      letter-spacing: 0.01em;
    }

    #media-caption.has-text {
      display: block;
    }

    /* ─── Badge auteur ───────────────────────────────────────────────────── */
    #author-badge {
      display: none;
      position: absolute;
      top: -20px;
      left: 16px;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.8);
      padding: 6px 14px 6px 6px;
      border-radius: 24px;
    }

    #author-badge.visible {
      display: flex;
    }

    #author-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }

    #author-name {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
    }

    /* ─── Barre de progression ───────────────────────────────────────────── */
    #progress-bar-wrapper {
      position: absolute;
      bottom: -10px;
      left: 0;
      right: 0;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    #progress-bar-wrapper.visible {
      display: block;
    }

    #progress-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #5865f2, #eb459e);
      transform-origin: left;
      transform: scaleX(1);
      transition: transform linear;
    }

    /* ─── Statut de connexion (coin bas-droit, invisible en stream) ───────── */
    #connection-status {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.4);
      padding: 4px 10px;
      border-radius: 20px;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    #connection-status.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>

  <div id="overlay-container">
    <div id="media-box">
      <!-- Badge auteur -->
      <div id="author-badge">
        <img id="author-avatar" src="" alt="" />
        <span id="author-name"></span>
      </div>

      <!-- Média : remplacé dynamiquement par <img> ou <video> -->
      <div id="media-wrapper">
        <img id="media-element" src="" alt="overlay media" style="display:none;" />
      </div>

      <!-- Légende texte -->
      <div id="media-caption"></div>

      <!-- Barre de progression -->
      <div id="progress-bar-wrapper">
        <div id="progress-bar"></div>
      </div>
    </div>
  </div>

  <div id="connection-status">Connexion...</div>

  <script>
    // ─── Lecture du guildId depuis l'URL ────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const guildId = params.get('guildId');

    const statusEl = document.getElementById('connection-status');

    if (!guildId) {
      statusEl.textContent = '⚠️ guildId manquant dans l\'URL';
      throw new Error('URL invalide : paramètre guildId manquant.');
    }

    // ─── Éléments DOM ───────────────────────────────────────────────────────
    const mediaBox       = document.getElementById('media-box');
    const mediaWrapper   = document.getElementById('media-wrapper');
    const mediaCaption   = document.getElementById('media-caption');
    const authorBadge    = document.getElementById('author-badge');
    const authorAvatar   = document.getElementById('author-avatar');
    const authorName     = document.getElementById('author-name');
    const progressWrapper = document.getElementById('progress-bar-wrapper');
    const progressBar    = document.getElementById('progress-bar');

    // ─── État local ─────────────────────────────────────────────────────────
    let hideTimer      = null;
    let currentMediaEl = null;

    // ─── Connexion Socket.io ─────────────────────────────────────────────────
    const socket = io({
      transports: ['websocket', 'polling'],
      reconnectionDelay: 1000,
      reconnectionDelayMax: 10000,
    });

    socket.on('connect', () => {
      console.log('[overlay] Connecté :', socket.id);
      statusEl.textContent = '✅ Connecté';
      setTimeout(() => statusEl.classList.add('hidden'), 3000);

      // Rejoindre la room de la guilde
      socket.emit('join-room', guildId);
    });

    socket.on('room:joined', ({ guildId: roomId }) => {
      console.log('[overlay] Room rejointe :', roomId);
    });

    socket.on('disconnect', (reason) => {
      console.warn('[overlay] Déconnexion :', reason);
      statusEl.textContent = '🔴 Déconnecté — reconnexion...';
      statusEl.classList.remove('hidden');
    });

    socket.on('connect_error', (err) => {
      console.error('[overlay] Erreur de connexion :', err.message);
      statusEl.textContent = '⚠️ Erreur de connexion';
      statusEl.classList.remove('hidden');
    });

    // ─── Réception d'un média ────────────────────────────────────────────────
    socket.on('media:play', (payload) => {
      console.log('[overlay] Média reçu :', payload);
      displayMedia(payload);
    });

    // ─── Affichage du média ──────────────────────────────────────────────────
    function displayMedia(payload) {
      // Annule un éventuel timer précédent
      if (hideTimer !== null) {
        clearTimeout(hideTimer);
        hideTimer = null;
      }

      // Masquage immédiat si un média est déjà affiché
      if (mediaBox.classList.contains('visible')) {
        hideMedia(false);
      }

      // Parse content : "url||texte optionnel"
      const [rawUrl, captionText] = payload.content.split('||');
      const url = rawUrl.trim();

      // ── Construit l'élément média ──────────────────────────────────────
      mediaWrapper.innerHTML = '';

      if (payload.type === 'video') {
        const video = document.createElement('video');
        video.id = 'media-element';
        video.autoplay = true;
        video.muted = false;
        video.loop = false;
        video.playsInline = true;
        video.src = url;
        video.style.cssText = `
          display: block;
          max-width: 1600px;
          max-height: 820px;
          width: auto;
          height: auto;
          object-fit: contain;
          border-radius: 12px;
          box-shadow: 0 8px 48px rgba(0,0,0,0.6);
        `;
        mediaWrapper.appendChild(video);
        currentMediaEl = video;
      } else {
        const img = document.createElement('img');
        img.id = 'media-element';
        img.src = url;
        img.alt = 'overlay media';
        img.style.cssText = `
          display: block;
          max-width: 1600px;
          max-height: 820px;
          width: auto;
          height: auto;
          object-fit: contain;
          border-radius: 12px;
          box-shadow: 0 8px 48px rgba(0,0,0,0.6);
        `;
        mediaWrapper.appendChild(img);
        currentMediaEl = img;
      }

      // ── Texte (caption) ────────────────────────────────────────────────
      if (captionText && captionText.trim()) {
        mediaCaption.textContent = captionText.trim();
        mediaCaption.classList.add('has-text');
      } else {
        mediaCaption.textContent = '';
        mediaCaption.classList.remove('has-text');
      }

      // ── Badge auteur ───────────────────────────────────────────────────
      if (payload.author) {
        authorName.textContent = payload.author;
        if (payload.authorImage) {
          authorAvatar.src = payload.authorImage;
          authorAvatar.style.display = 'block';
        } else {
          authorAvatar.style.display = 'none';
        }
        authorBadge.classList.add('visible');
      } else {
        authorBadge.classList.remove('visible');
      }

      // ── Barre de progression ───────────────────────────────────────────
      progressBar.style.transition = 'none';
      progressBar.style.transform = 'scaleX(1)';
      progressWrapper.classList.add('visible');

      // Déclenche la transition CSS de la barre (réduit à 0 en `duration`s)
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          progressBar.style.transition = `transform ${payload.duration}s linear`;
          progressBar.style.transform = 'scaleX(0)';
        });
      });

      // ── Animation d'entrée ─────────────────────────────────────────────
      requestAnimationFrame(() => {
        mediaBox.classList.add('visible');
      });

      // ── Timer de masquage ──────────────────────────────────────────────
      hideTimer = setTimeout(() => {
        hideMedia(true);
      }, payload.duration * 1000);
    }

    function hideMedia(resetProgress = true) {
      mediaBox.classList.remove('visible');
      mediaBox.classList.add('hiding');

      if (resetProgress) {
        progressWrapper.classList.remove('visible');
        progressBar.style.transition = 'none';
        progressBar.style.transform = 'scaleX(0)';
      }

      setTimeout(() => {
        mediaBox.classList.remove('hiding');
        // Stoppe la vidéo si besoin
        if (currentMediaEl && currentMediaEl.tagName === 'VIDEO') {
          currentMediaEl.pause();
          currentMediaEl.src = '';
        }
        mediaWrapper.innerHTML = '';
        currentMediaEl = null;
        mediaCaption.textContent = '';
        mediaCaption.classList.remove('has-text');
        authorBadge.classList.remove('visible');
      }, 350);
    }
  </script>
</body>
</html>
